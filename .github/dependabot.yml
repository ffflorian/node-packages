updates:
  - assignees:
      - ffflorian
    commit-message:
      prefix: fix(deps)
      prefix-development: chore(deps-dev)
    cooldown:
      default-days: 5
      exclude:
        - '@ffflorian/*'
        - crates.io
    directory: /
    groups:
      oxlint:
        patterns:
          - oxlint
          - eslint-plugin-oxlint
      protobufjs:
        patterns:
          - protobufjs*
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major
      - dependency-name: '@types/express'
        update-types:
          - version-update:semver-major
    open-pull-requests-limit: 99
    package-ecosystem: npm
    schedule:
      interval: weekly
    versioning-strategy: increase
  - assignees:
      - ffflorian
    commit-message:
      prefix: ci(deps)
    cooldown:
      default-days: 5
      exclude:
        - ffflorian/*
    directory: /
    open-pull-requests-limit: 99
    package-ecosystem: github-actions
    schedule:
      interval: weekly
version: 2
